name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 编出 ShellNavigate DLL；publish 时 IncludeAllContentForSelfExtract 将其打入单文件 exe，运行时解压到 BaseDirectory
      - name: Build ShellNavigate native DLLs
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          & "${{ github.workspace }}/native/ShellNavigate/build.ps1"
          $d64 = "${{ github.workspace }}/native/ShellNavigate/bin/x64/Release/ClipboardXShellNavigate.dll"
          $d32 = "${{ github.workspace }}/native/ShellNavigate/bin/Win32/Release/ClipboardXShellNavigate32.dll"
          if (-not (Test-Path $d64)) { throw "Missing $d64" }
          if (-not (Test-Path $d32)) { throw "Missing $d32" }

      - name: Version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # 勿对 FDD 使用 EnableCompressionInSingleFile（NETSDK1176：仅独立应用支持捆绑内压缩）。
      # 在默认 shell pwsh 下请用 -p:SelfContained=...，避免 --self-contained false 被误解析导致两种包一样大。
      - name: Publish — 不含运行时（需本机安装 .NET 8）
        run: >
          dotnet publish ClipboardManager.csproj -c Release -r win-x64
          -p:SelfContained=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:DebugType=None
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/fdd

      - name: Publish — 自带运行时（单文件）
        run: >
          dotnet publish ClipboardManager.csproj -c Release -r win-x64
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/sc

      - name: Verify publish output is single-file (no loose .dll)
        shell: pwsh
        run: |
          foreach ($dir in @('publish/fdd', 'publish/sc')) {
            $loose = Get-ChildItem -Path $dir -Filter '*.dll' -File -ErrorAction SilentlyContinue
            if ($loose.Count -gt 0) {
              throw "Expected all native payloads inside ClipboardX.exe; found in ${dir}: $($loose.Name -join ', ')"
            }
            $exe = Join-Path $dir 'ClipboardX.exe'
            if (-not (Test-Path $exe)) { throw "Missing $exe" }
          }

      - name: Check exe sizes (no-runtime 应远小于 self-contained)
        shell: pwsh
        run: |
          $fdd = (Get-Item publish/fdd/ClipboardX.exe).Length
          $sc = (Get-Item publish/sc/ClipboardX.exe).Length
          Write-Host "no-runtime ClipboardX.exe: $fdd bytes (~$([math]::Round($fdd/1MB, 2)) MB)"
          Write-Host "self-contained ClipboardX.exe: $sc bytes (~$([math]::Round($sc/1MB, 2)) MB)"
          if ($fdd -ge $sc) {
            throw "no-runtime exe should be smaller than self-contained (SelfContained flag likely wrong)."
          }
          if ($sc -lt $fdd * 4) {
            throw "self-contained exe unexpectedly close in size to no-runtime; publish may be misconfigured."
          }

      - name: Zip artifacts
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          Compress-Archive -Path 'publish/fdd/*' -DestinationPath "ClipboardX-$v-win-x64-no-runtime.zip" -Force
          Compress-Archive -Path 'publish/sc/*' -DestinationPath "ClipboardX-$v-win-x64-self-contained.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ClipboardX-${{ steps.ver.outputs.version }}-win-x64-no-runtime.zip
            ClipboardX-${{ steps.ver.outputs.version }}-win-x64-self-contained.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
