name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish — 不含运行时（需本机安装 .NET 8）
        run: >
          dotnet publish ClipboardManager.csproj -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/fdd

      - name: Publish — 自带运行时（单文件）
        run: >
          dotnet publish ClipboardManager.csproj -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/sc

      - name: Zip artifacts
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          Compress-Archive -Path 'publish/fdd/*' -DestinationPath "ClipboardManager-$v-win-x64-no-runtime.zip" -Force
          Compress-Archive -Path 'publish/sc/*' -DestinationPath "ClipboardManager-$v-win-x64-self-contained.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ClipboardManager-${{ steps.ver.outputs.version }}-win-x64-no-runtime.zip
            ClipboardManager-${{ steps.ver.outputs.version }}-win-x64-self-contained.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
